<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Cache-Control"
      content="no-store, no-cache, must-revalidate, proxy-revalidate"
    />
    <title>Reset GolfCaddy Cache</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #166534;
        color: white;
      }

      main {
        width: min(88vw, 420px);
        text-align: center;
      }

      h1 {
        font-size: 1.7rem;
        margin: 0 0 0.75rem;
      }

      p {
        color: #dcfce7;
        line-height: 1.5;
      }

      a {
        display: inline-block;
        margin-top: 1rem;
        border-radius: 8px;
        background: white;
        color: #166534;
        padding: 0.8rem 1rem;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Resetting GolfCaddy</h1>
      <p id="status">Clearing old app cache and service worker...</p>
      <a id="homeLink" href="/">Open GolfCaddy</a>
    </main>
    <script>
      async function resetGolfCaddyCache() {
        const status = document.getElementById("status");
        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }

          if ("caches" in window) {
            const cacheNames = await window.caches.keys();
            await Promise.all(cacheNames.map((cacheName) => window.caches.delete(cacheName)));
          }

          status.textContent = "Cache cleared. Reopening GolfCaddy...";
          window.location.replace("/?cache-reset=" + Date.now());
        } catch (error) {
          console.warn("Unable to clear GolfCaddy cache", error);
          status.textContent = "Cache reset attempted. Tap below to reopen GolfCaddy.";
        }
      }

      resetGolfCaddyCache();
    </script>
  </body>
</html>
